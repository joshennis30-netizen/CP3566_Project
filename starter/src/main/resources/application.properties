# File-backed H2: the dataset is written to ./data.mv.db and survives a restart.
spring.datasource.url=jdbc:h2:file:./data
spring.datasource.driver-class-name=org.h2.Driver

# Print the SQL Hibernate generates (you'll see it CREATE the 8 tables from the @Entity classes).
spring.jpa.show-sql=true

# Browser console at http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:file:./data, user SA, no password)
spring.h2.console.enabled=true

# Build the tables from the @Entity classes on first run, then keep them across restarts.
spring.jpa.hibernate.ddl-auto=update

# How many transactions to generate. Small by default so the app stays light on a laptop
# (CPU, RAM, disk). Raise it for a bigger dataset; the run's heap is capped at -Xmx512m (pom.xml).
app.transaction-count=50000

# Class dataset: if a file with this name exists in the project folder, it is parsed and loaded
# (the shared dataset your instructor gives the class). Otherwise a sample dataset is generated.
app.data-file=fraud-data.xlsx

# Active when the "postgres" profile is on; layered on top of application.properties.
# Start the database first:  docker compose up -d
# Then run with:             ./mvnw spring-boot:run -Dspring-boot.run.profiles=postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/fraud
spring.datasource.username=fraud
spring.datasource.password=fraud
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
